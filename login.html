<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilos/login.css">
</head>
<body>
    <main>
        <section id="login">
            <div>
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente.</p>
                <form action="" method="post" autocomplete="on">
                    <div class="campo">
                        <label for="ilogin" class="legend">E-mail:</label>
                        <input type="Email" name="login" id="ilogin"  required autocomplete="email" class="content">
                    </div>
                    <div class="campo">
                        <label for="isenha" class="legend">Senha:</label>
                        <input type="password" name="senha" id="isenha"  required autocomplete="current-password" minlength="8" maxlength="20" class="content">
                    </div>
                    <div id="botão">
                        <input type="submit" value="Entrar" class="comandos" id="enviar">
                        <a href="Esqueci.html" class="comandos" id="Esqueci">Esqueci a senha</a>
                    </div>
                </form>
            </div>
        </section>
        <section id="mensagem">
            <p>Nenhum dado de login será salvo! <br> <mark>É APENAS PARA TESTE</mark></p>
        </section>
    </main>
</body>
</html>
